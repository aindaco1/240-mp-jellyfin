name: Release

on:
  push:
    tags:
      - 'v*.*'

jobs:

  # ──────────────────────────────────────────────────────────────────────────────
  # macOS arm64 (Apple Silicon)
  # ──────────────────────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Install package helpers
        run: brew install mpv ffmpeg

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build

      - name: Deploy Qt frameworks
        run: |
          APP="${GITHUB_WORKSPACE}/install/240-mp-jellyfin.app"
          "${QT_ROOT_DIR}/bin/macdeployqt" "$APP" -qmldir="${GITHUB_WORKSPACE}" -verbose=2
          QML_IMPORT_SCANNER="$("${QT_ROOT_DIR}/bin/qtpaths" --query QT_INSTALL_LIBEXECS)/qmlimportscanner"
          QML_IMPORT_PATH="$("${QT_ROOT_DIR}/bin/qtpaths" --query QT_INSTALL_QML)"
          scripts/macos_prune_qt_deployment.zsh \
            "$APP" "$GITHUB_WORKSPACE" "$QML_IMPORT_SCANNER" "$QML_IMPORT_PATH"

      - name: Verify self-contained app bundle
        run: |
          APP="${GITHUB_WORKSPACE}/install/240-mp-jellyfin.app"
          BIN="$APP/Contents/Resources/bin"
          HELPER_HOME="$RUNNER_TEMP/helper-home"
          mkdir -p "$HELPER_HOME"

          expected_yt_dlp=$(sed -n 's/^YT_DLP_VERSION:STRING=//p' build/CMakeCache.txt)
          expected_deno=$(sed -n 's/^DENO_VERSION:STRING=//p' build/CMakeCache.txt)
          test "$(env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/yt-dlp" --version)" = "$expected_yt_dlp"
          env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/deno" --version | head -n 1 | grep -F "deno $expected_deno"
          env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/mpv" --version >/dev/null
          env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/ffmpeg" -version >/dev/null
          env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/ffprobe" -version >/dev/null

          for channel_id in \
            UCtPzvwooQ18YZ8Wq8Hka60g \
            UCBfV298JqKc8o9CM0aANz5A \
            UCoVB6wMm2pNGMKQTChKCiRQ \
            UCIauImhx1GGrl7LubRCxXcg \
            UCNU7LlZ_nKVaq9Lihj0sAHQ \
            UCR0kPElUivbuZC7Myr7Tg1Q \
            UCTQHT1Gj_D_Bc7P1REuMoAg \
            UCPZsA3OSQreeZlKIo6jqUog \
            UCvgYvYeZe-BANj-cVUd59mQ \
            UCkXE7x417ME2iudNECaLUFA \
            UC6m4V2RfKXs4dP3R7AfCK4g \
            UCqspiYXbxpZpgWzzxUUbTiw \
            UCdwO61VZMYpozDiAJ6ZI3pg \
            UC4T6FfTdpvxUrf9-dd4kjpw \
            UCxuk5azVGJ-aumAds7WMHmg \
            UCg0i5aSL_2rhf4iztlLmLUQ; do
            sample=$(env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin \
              "$BIN/yt-dlp" --no-config --no-update --no-cache-dir --no-warnings \
              --flat-playlist --lazy-playlist --playlist-end 1 \
              --js-runtimes "deno:$BIN/deno" \
              --print '%(id)s\t%(title)s' \
              "https://www.youtube.com/channel/$channel_id/videos")
            test -n "$sample"
          done

          scripts/macos_verify_bundle.zsh "$APP"

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      - name: Sign app
        run: |
          APP="${GITHUB_WORKSPACE}/install/240-mp-jellyfin.app"
          IDENTITY="Developer ID Application"
          find "$APP/Contents/Frameworks" \( -name "*.dylib" -o -name "*.framework" \) \
            -exec codesign --force --options runtime --sign "$IDENTITY" {} \;
          if [ -d "$APP/Contents/Resources/bin" ]; then
            find "$APP/Contents/Resources/bin" -type f | while read -r helper; do
              if [ -x "$helper" ]; then
                case "$(basename "$helper")" in
                  mpv) entitlement_file="packaging/mpv.entitlements" ;;
                  yt-dlp) entitlement_file="packaging/yt-dlp.entitlements" ;;
                  *) entitlement_file="" ;;
                esac
                if [ -n "$entitlement_file" ]; then
                  codesign --force --options runtime \
                    --entitlements "$entitlement_file" \
                    --sign "$IDENTITY" "$helper"
                else
                  codesign --force --options runtime \
                    --preserve-metadata=entitlements \
                    --sign "$IDENTITY" "$helper"
                fi
              fi
            done
          fi
          codesign --force --deep --options runtime \
            --preserve-metadata=entitlements \
            --sign "$IDENTITY" "$APP"
          codesign --verify --deep --strict "$APP"

          SMOKE_MEDIA="$RUNNER_TEMP/mpv-signing-smoke.mkv"
          "$APP/Contents/Resources/bin/ffmpeg" \
            -hide_banner -loglevel error \
            -f lavfi -i "color=c=blue:s=320x180:d=1:r=24" \
            -f lavfi -i "sine=frequency=440:duration=1" \
            -c:v ffv1 -c:a pcm_s16le -shortest "$SMOKE_MEDIA"
          "$APP/Contents/Resources/bin/mpv" "$SMOKE_MEDIA" \
            --no-config \
            --script="$APP/Contents/Resources/scripts/mpv-osc.lua" \
            --vo=null --ao=null --frames=1

      - name: Create DMG
        run: |
          DMG="240-mp-jellyfin-${{ github.ref_name }}-macOS-arm64.dmg"
          hdiutil create \
            -volname "240-mp-jellyfin" \
            -srcfolder "${GITHUB_WORKSPACE}/install" \
            -ov -format UDZO \
            "$DMG"
          codesign --force --timestamp \
            --sign "Developer ID Application" \
            "$DMG"
          codesign --verify "$DMG"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="240-mp-jellyfin-${{ github.ref_name }}-macOS-arm64.dmg"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Remove signing keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db"

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dmg-arm64
          path: "240-mp-jellyfin-*-macOS-arm64.dmg"
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release
  # ──────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Download artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "240-mp-jellyfin ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            artifacts/dmg-arm64/*.dmg
          body: |
            ### Downloads:

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `240-mp-jellyfin-${{ github.ref_name }}-macOS-arm64.dmg` |

            ### Install Instructions:

            - macOS (Apple Silicon): Download the `.dmg`, open and move 240-mp-jellyfin.app to your Applications folder

            ### Update Instructions:

            - macOS (Apple Silicon): Download the `.dmg`, open and replace 240-mp-jellyfin.app in your Applications folder
