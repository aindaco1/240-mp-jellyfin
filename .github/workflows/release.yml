name: Release

on:
  push:
    tags:
      - 'v*.*'
      - '[0-9]*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to build and publish
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:

  # ──────────────────────────────────────────────────────────────────────────────
  # macOS arm64 (Apple Silicon)
  # ──────────────────────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        run: |
          release_version="${RELEASE_TAG#v}"
          release_base_version="${release_version%%-*}"
          project_version=$(sed -nE 's/^project\(240mp VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt)
          test -n "$project_version"
          test "$release_base_version" = "$project_version"

      - name: Install build and package dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install cmake qt mpv ffmpeg
          echo "QT_ROOT_DIR=$(brew --prefix qt)" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build

      - name: Deploy Qt frameworks
        run: |
          APP="${GITHUB_WORKSPACE}/install/240-mp-jellyfin.app"
          "${QT_ROOT_DIR}/bin/macdeployqt" "$APP" -qmldir="${GITHUB_WORKSPACE}" -verbose=2
          QML_IMPORT_SCANNER="$("${QT_ROOT_DIR}/bin/qtpaths" --query QT_INSTALL_LIBEXECS)/qmlimportscanner"
          QML_IMPORT_PATH="$("${QT_ROOT_DIR}/bin/qtpaths" --query QT_INSTALL_QML)"
          scripts/macos_prune_qt_deployment.zsh \
            "$APP" "$GITHUB_WORKSPACE" "$QML_IMPORT_SCANNER" "$QML_IMPORT_PATH"

      - name: Verify self-contained bundle structure
        run: |
          APP="${GITHUB_WORKSPACE}/install/240-mp-jellyfin.app"
          scripts/macos_verify_bundle.zsh "$APP"

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          printf '%s' "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      - name: Sign app
        run: |
          APP="${GITHUB_WORKSPACE}/install/240-mp-jellyfin.app"
          IDENTITY="Developer ID Application"
          find "$APP/Contents/Frameworks" \( -name "*.dylib" -o -name "*.framework" \) \
            -exec codesign --force --options runtime --timestamp --sign "$IDENTITY" {} \;
          if [ -d "$APP/Contents/Resources/bin" ]; then
            find "$APP/Contents/Resources/bin" -type f | while read -r helper; do
              if [ -x "$helper" ]; then
                case "$(basename "$helper")" in
                  mpv) entitlement_file="packaging/mpv.entitlements" ;;
                  yt-dlp) entitlement_file="packaging/yt-dlp.entitlements" ;;
                  *) entitlement_file="" ;;
                esac
                if [ -n "$entitlement_file" ]; then
                  codesign --force --options runtime \
                    --timestamp \
                    --entitlements "$entitlement_file" \
                    --sign "$IDENTITY" "$helper"
                else
                  codesign --force --options runtime \
                    --timestamp \
                    --preserve-metadata=entitlements \
                    --sign "$IDENTITY" "$helper"
                fi
              fi
            done
          fi
          codesign --force --deep --options runtime \
            --timestamp \
            --preserve-metadata=entitlements \
            --sign "$IDENTITY" "$APP"
          codesign --verify --deep --strict "$APP"
          expected_team=$(sed -n 's/^APP_UPDATE_TEAM_ID:STRING=//p' build/CMakeCache.txt)
          actual_team=$(codesign -dv --verbose=4 "$APP" 2>&1 | sed -n 's/^TeamIdentifier=//p')
          test -n "$expected_team"
          test "$actual_team" = "$expected_team"

      - name: Verify signed runtime and live sources
        run: |
          APP="${GITHUB_WORKSPACE}/install/240-mp-jellyfin.app"
          BIN="$APP/Contents/Resources/bin"
          HELPER_HOME="$RUNNER_TEMP/helper-home"
          mkdir -p "$HELPER_HOME"

          expected_yt_dlp=$(sed -n 's/^YT_DLP_VERSION:STRING=//p' build/CMakeCache.txt)
          expected_deno=$(sed -n 's/^DENO_VERSION:STRING=//p' build/CMakeCache.txt)
          test "$(env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/yt-dlp" --version)" = "$expected_yt_dlp"
          env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/deno" --version | head -n 1 | grep -F "deno $expected_deno"
          env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/mpv" --version >/dev/null
          env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/ffmpeg" -version >/dev/null
          env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin "$BIN/ffprobe" -version >/dev/null

          SMOKE_MEDIA="$RUNNER_TEMP/mpv-signing-smoke.mkv"
          "$BIN/ffmpeg" \
            -hide_banner -loglevel error \
            -f lavfi -i "color=c=blue:s=320x180:d=1:r=24" \
            -f lavfi -i "sine=frequency=440:duration=1" \
            -c:v ffv1 -c:a pcm_s16le -shortest "$SMOKE_MEDIA"
          "$BIN/mpv" "$SMOKE_MEDIA" \
            --no-config \
            --script="$APP/Contents/Resources/scripts/mpv-osc.lua" \
            --script="$APP/Contents/Resources/scripts/media-keys.lua" \
            --script="$APP/Contents/Resources/scripts/screensaver.lua" \
            --vo=null --ao=null --frames=1

          for channel_id in \
            UCtPzvwooQ18YZ8Wq8Hka60g \
            UCBfV298JqKc8o9CM0aANz5A \
            UCoVB6wMm2pNGMKQTChKCiRQ \
            UCIauImhx1GGrl7LubRCxXcg \
            UCNU7LlZ_nKVaq9Lihj0sAHQ \
            UCR0kPElUivbuZC7Myr7Tg1Q \
            UCTQHT1Gj_D_Bc7P1REuMoAg \
            UCPZsA3OSQreeZlKIo6jqUog \
            UCvgYvYeZe-BANj-cVUd59mQ \
            UCkXE7x417ME2iudNECaLUFA \
            UC6m4V2RfKXs4dP3R7AfCK4g \
            UCqspiYXbxpZpgWzzxUUbTiw \
            UCdwO61VZMYpozDiAJ6ZI3pg \
            UC4T6FfTdpvxUrf9-dd4kjpw \
            UCxuk5azVGJ-aumAds7WMHmg \
            UCg0i5aSL_2rhf4iztlLmLUQ; do
            sample=$(env -i HOME="$HELPER_HOME" PATH=/usr/bin:/bin \
              "$BIN/yt-dlp" --no-config --no-update --no-cache-dir --no-warnings \
              --flat-playlist --lazy-playlist --playlist-end 1 \
              --js-runtimes "deno:$BIN/deno" \
              --print '%(id)s\t%(title)s' \
              "https://www.youtube.com/channel/$channel_id/videos")
            test -n "$sample"
          done

      - name: Prepare notarization credentials
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary-key.p8"
          chmod 600 "$RUNNER_TEMP/notary-key.p8"

      - name: Notarize and staple app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          APP="${GITHUB_WORKSPACE}/install/240-mp-jellyfin.app"
          APP_ZIP="$RUNNER_TEMP/240-mp-jellyfin-app.zip"
          ditto -c -k --keepParent "$APP" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --key "$RUNNER_TEMP/notary-key.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          spctl -a -t exec -vv "$APP"

      - name: Create DMG
        run: |
          DMG="240-mp-jellyfin-${{ env.RELEASE_TAG }}-macOS-arm64.dmg"
          hdiutil create \
            -volname "240-mp-jellyfin" \
            -srcfolder "${GITHUB_WORKSPACE}/install" \
            -ov -format UDZO \
            "$DMG"
          codesign --force --timestamp \
            --sign "Developer ID Application" \
            "$DMG"
          codesign --verify "$DMG"

      - name: Notarize and staple
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          DMG="240-mp-jellyfin-${{ env.RELEASE_TAG }}-macOS-arm64.dmg"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/notary-key.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG"

      - name: Create SHA-256 checksum
        run: |
          DMG="240-mp-jellyfin-${{ env.RELEASE_TAG }}-macOS-arm64.dmg"
          shasum -a 256 "$DMG" > "$DMG.sha256"

      - name: Remove signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notary-key.p8"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dmg-arm64
          path: |
            240-mp-jellyfin-*-macOS-arm64.dmg
            240-mp-jellyfin-*-macOS-arm64.dmg.sha256
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release
  # ──────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Prepare release notes
        run: |
          version="${RELEASE_TAG#v}"
          notes="$RUNNER_TEMP/release-notes.md"
          awk -v version="$version" '
            index($0, "## [" version "]") == 1 { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "$notes"
          test -s "$notes"
          cat >> "$notes" <<EOF

          ## Install

          Download the Apple Silicon DMG below, open it, and move \`240-mp-jellyfin.app\` to Applications. Existing settings, Jellyfin authentication, and Karaoke data are retained when replacing an older app bundle.
          EOF

      - name: Publish
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "240-mp-jellyfin ${{ env.RELEASE_TAG }}"
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc') || contains(env.RELEASE_TAG, '-beta') || contains(env.RELEASE_TAG, '-alpha') }}
          body_path: ${{ runner.temp }}/release-notes.md
          fail_on_unmatched_files: true
          files: |
            artifacts/dmg-arm64/*.dmg
            artifacts/dmg-arm64/*.dmg.sha256
